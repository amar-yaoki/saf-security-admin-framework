<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" aria-label="SAF Guida Sito — Tab Sicurezza">
  <rect width="800" height="600" fill="#f0f0f1"/>
  <rect width="800" height="50" fill="#1d2327"/>
  <rect x="0" y="50" width="800" height="4" fill="#f47d39"/>
  <text x="20" y="32" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#f0f0f1">📖 Guida Sito</text>
  <rect x="20" y="70" width="760" height="42" fill="#121212" rx="4"/>
  <text x="30" y="96" font-family="system-ui, sans-serif" font-size="14" fill="#666" font-variant="all-petite-caps">Info</text>
  <text x="120" y="96" font-family="system-ui, sans-serif" font-size="14" fill="#666" font-variant="all-petite-caps">Struttura</text>
  <text x="240" y="96" font-family="system-ui, sans-serif" font-size="14" fill="#666" font-variant="all-petite-caps">Shortcode</text>
  <text x="350" y="96" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#f47d39" font-variant="all-petite-caps">Sicurezza</text>
  <text x="460" y="96" font-family="system-ui, sans-serif" font-size="14" fill="#666" font-variant="all-petite-caps">Checklist</text>
  <text x="570" y="96" font-family="system-ui, sans-serif" font-size="14" fill="#666" font-variant="all-petite-caps">Progetto</text>
  <text x="680" y="96" font-family="system-ui, sans-serif" font-size="14" fill="#666" font-variant="all-petite-caps">Note</text>
  <rect x="20" y="112" width="760" height="2" fill="#f47d39"/>
  <rect x="20" y="124" width="760" height="460" fill="#fff" rx="0 0 6 6"/>
  <text x="40" y="160" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1d2327">🔒 Misure di Sicurezza Attive</text>
  <rect x="40" y="180" width="720" height="1" fill="#e0e0e0"/>
  <text x="40" y="208" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#121212">✅ Rate Limiting Login</text>
  <text x="40" y="228" font-family="system-ui, sans-serif" font-size="12" fill="#666">Blocco IP dopo N tentativi falliti (configurabile in Dati Sito → Sicurezza)</text>
  <text x="40" y="260" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#121212">✅ XML-RPC Disabilitato</text>
  <text x="40" y="280" font-family="system-ui, sans-serif" font-size="12" fill="#666">Prevenzione attacchi brute force via XML-RPC</text>
  <text x="40" y="312" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#121212">✅ Security Headers</text>
  <text x="40" y="332" font-family="system-ui, sans-serif" font-size="12" fill="#666">X-Content-Type-Options: nosniff, X-Frame-Options: SAMEORIGIN</text>
  <text x="40" y="364" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#121212">✅ Honeypot Anti-Bot</text>
  <text x="40" y="384" font-family="system-ui, sans-serif" font-size="12" fill="#666">Campo nascosto nel form di login per bloccare bot automatici</text>
  <text x="40" y="416" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#121212">✅ Author Enumeration Disabled</text>
  <text x="40" y="436" font-family="system-ui, sans-serif" font-size="12" fill="#666">/author/slug restituisce 404 (previene enumerazione utenti)</text>
  <text x="40" y="468" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#121212">✅ HSTS (opzionale)</text>
  <text x="40" y="488" font-family="system-ui, sans-serif" font-size="12" fill="#666">Strict-Transport-Security header — attivabile da Dati Sito → Avanzate</text>
  <rect x="40" y="520" width="220" height="18" fill="#e8f5e9" rx="3"/>
  <text x="48" y="533" font-family="system-ui, sans-serif" font-size="11" fill="#2e7d32">5/6 misure attive</text>
  <rect x="270" y="520" width="200" height="18" fill="#e8f5e9" rx="3"/>
  <rect x="270" y="520" width="166" height="18" fill="#4caf50" rx="3"/>
  <text x="370" y="533" font-family="system-ui, sans-serif" font-size="11" fill="#fff" text-anchor="middle">83%</text>
</svg>
